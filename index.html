<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1A6B45">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>如烟 · Mastery Path</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EFEDE8;--surface:#FFFFFF;--surface2:#F2F1EE;--border:#E5E3DD;--border2:#D0CEC8;
  --text:#1C1B18;--text2:#4A4845;--muted:#8C8A84;--muted2:#B8B6B0;
  --accent:#1A6B45;--accent-bg:#E8F4EE;--amber:#92560A;--amber-bg:#FBF2E6;
  --purple:#6B3FA0;--purple-bg:#F0E8F7;--red:#9B2C2C;--blue:#1D4E89;
  --radius:10px;--radius-sm:6px;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.05);
  --shadow:0 4px 16px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.05);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.14);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;overflow-x:clip;}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
.topbar{position:sticky;top:0;z-index:200;}
.site-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px 12px;padding-top:calc(env(safe-area-inset-top) + 16px);box-shadow:var(--shadow-sm);}
.header-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;max-width:1100px;margin:0 auto;}
.logo h1{font-size:1.1rem;font-weight:800;letter-spacing:-0.02em;}
.logo h1 span{color:var(--accent);}
.logo p{font-size:0.65rem;color:var(--muted);margin-top:1px;letter-spacing:0.02em;}
.header-btns{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.hbtn{font-family:inherit;font-size:0.72rem;font-weight:600;padding:7px 12px;border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;white-space:nowrap;}
.hbtn:hover{background:var(--surface2);border-color:var(--accent);color:var(--accent);}
.nav-wrap{background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.nav-wrap::-webkit-scrollbar{display:none;}
.nav{display:flex;width:max-content;min-width:100%;padding:0 10px;max-width:1100px;margin:0 auto;}
.ntab{font-family:inherit;font-weight:700;font-size:0.74rem;padding:11px 13px;border:none;border-bottom:2.5px solid transparent;background:none;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:6px;}
.ntab.active{color:var(--accent);border-bottom-color:var(--accent);}
.ntab .lock{font-size:0.7rem;opacity:0.5;}
.ntab .mod-dot{width:7px;height:7px;border-radius:50%;background:var(--border2);}
.ntab .mod-dot.done{background:var(--accent);}
.ntab .mod-dot.part{background:var(--amber);}
.wrap{max-width:1100px;margin:0 auto;padding:18px 18px 60px;}
.mod-head{margin-bottom:6px;}
.mod-head .mtag{font-size:0.6rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);}
.mod-head h2{font-size:1.3rem;font-weight:800;letter-spacing:-0.02em;margin-top:3px;}
.mod-head p{font-size:0.82rem;color:var(--text2);margin-top:6px;line-height:1.5;max-width:680px;}
.mod-prog{display:flex;align-items:center;gap:10px;margin:14px 0 4px;}
.bar{flex:1;height:7px;background:var(--surface2);border-radius:4px;overflow:hidden;border:1px solid var(--border);}
.bar > i{display:block;height:100%;background:var(--accent);border-radius:4px;transition:width .4s;}
.mod-prog span{font-size:0.66rem;font-weight:700;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.lesson{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--border2);border-radius:var(--radius);padding:14px 15px;margin-top:10px;display:flex;gap:13px;align-items:flex-start;cursor:pointer;transition:box-shadow .15s,transform .1s;position:relative;}
.lesson:hover{box-shadow:var(--shadow);}
.lesson:active{transform:scale(.997);}
.lesson.locked{cursor:not-allowed;opacity:0.6;background:var(--surface2);}
.lesson.mastered{border-left-color:var(--accent);}
.lesson.available{border-left-color:var(--amber);}
.lesson.cp{border-left-color:var(--purple);background:linear-gradient(0deg,var(--purple-bg),var(--surface) 60%);}
.lesson.cp.mastered{border-left-color:var(--accent);}
.l-badge{width:38px;height:38px;min-width:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.8rem;font-family:'JetBrains Mono',monospace;background:var(--surface2);color:var(--muted);border:1.5px solid var(--border2);}
.l-badge.mastered{background:var(--accent);color:#fff;border-color:var(--accent);}
.l-badge.available{background:var(--amber-bg);color:var(--amber);border-color:#E8C07A;}
.l-badge.cp{background:var(--purple-bg);color:var(--purple);border-color:#C4A8DC;}
.l-badge.cp.mastered{background:var(--accent);color:#fff;border-color:var(--accent);}
.l-main{flex:1;min-width:0;}
.l-title{font-size:0.92rem;font-weight:700;line-height:1.3;}
.l-focus{font-size:0.74rem;color:var(--muted);margin-top:3px;line-height:1.45;}
.l-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.chip{font-family:'JetBrains Mono',monospace;font-size:0.56rem;padding:2px 6px;border-radius:3px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);}
.chip.tempo{background:var(--amber-bg);border-color:#E8C07A;color:var(--amber);}
.chip.covers{background:var(--accent-bg);border-color:#A8C0DC;color:var(--blue);}
.chip.cp{background:var(--purple-bg);border-color:#C4A8DC;color:var(--purple);}
.l-status{font-size:0.62rem;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;align-self:flex-start;white-space:nowrap;}
.l-status.mastered{color:var(--accent);}
.l-status.available{color:var(--amber);}
.l-status.locked{color:var(--muted2);}
.scrim{display:none;position:fixed;inset:0;background:rgba(28,27,24,.45);z-index:899;}
.scrim.open{display:block;}
.detail{display:none;position:fixed;inset:0;z-index:910;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;flex-direction:column;}
.detail.open{display:flex;}
.d-close{display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top) + 12px) 20px 12px;background:var(--surface);border-bottom:1px solid var(--border);font-size:0.65rem;color:var(--muted);font-weight:700;position:sticky;top:0;z-index:10;letter-spacing:0.05em;text-transform:uppercase;}
.d-close button{border:1.5px solid var(--border2);background:var(--surface2);color:var(--text2);border-radius:var(--radius-sm);padding:7px 14px;font-size:0.72rem;font-weight:700;cursor:pointer;font-family:inherit;}
.d-body{padding:24px 20px calc(env(safe-area-inset-bottom) + 40px);max-width:720px;margin:0 auto;width:100%;}
.d-title{font-size:1.5rem;font-weight:800;letter-spacing:-0.02em;line-height:1.2;}
.d-focus{font-size:0.95rem;color:var(--text2);margin-top:8px;line-height:1.6;}
.d-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.d-section{margin-top:24px;}
.d-h{font-size:0.6rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:11px;}
.d-h.cp{color:var(--purple);}
.d-h.std{color:var(--amber);}
.item{display:flex;gap:11px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);}
.item:last-child{border-bottom:none;}
.check{width:22px;height:22px;min-width:22px;border-radius:6px;border:2px solid var(--border2);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .12s;}
.check.on{background:var(--accent);border-color:var(--accent);}
.check.on::after{content:'✓';color:#fff;font-size:0.8rem;font-weight:800;}
.check.std.on{background:var(--amber);border-color:var(--amber);}
.item-text{font-size:0.9rem;line-height:1.55;color:var(--text2);flex:1;}
.std .item-text{font-weight:600;color:var(--text);}
.notes{width:100%;border:1.5px solid var(--border2);border-radius:8px;padding:11px 13px;font-size:0.88rem;font-family:inherit;color:var(--text);background:var(--surface2);resize:vertical;min-height:80px;line-height:1.55;-webkit-appearance:none;}
.notes:focus{outline:none;border-color:var(--accent);}
.log-form{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:14px;}
.log-form .row{display:flex;gap:8px;align-items:center;margin-bottom:9px;}
.log-min{width:84px;border:1.5px solid var(--border2);border-radius:7px;padding:9px 11px;font-size:0.9rem;font-family:inherit;background:var(--surface);color:var(--text);-webkit-appearance:none;}
.log-min:focus{outline:none;border-color:var(--accent);}
.log-min-label{font-size:0.8rem;color:var(--muted);font-weight:600;}
.log-note{width:100%;border:1.5px solid var(--border2);border-radius:7px;padding:10px 12px;font-size:0.88rem;font-family:inherit;background:var(--surface);color:var(--text);resize:vertical;min-height:60px;line-height:1.5;-webkit-appearance:none;}
.log-note:focus{outline:none;border-color:var(--accent);}
.log-add{width:100%;margin-top:9px;padding:11px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-family:inherit;font-weight:700;font-size:0.85rem;cursor:pointer;}
.log-add:hover{background:#145535;}
.log-rollup{font-size:0.66rem;font-weight:700;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:9px;text-transform:uppercase;letter-spacing:0.04em;}
.log-list{display:flex;flex-direction:column;gap:8px;}
.log-entry{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:10px 12px;}
.log-head{display:flex;align-items:center;gap:8px;}
.log-date{font-size:0.78rem;font-weight:700;color:var(--text);}
.log-meta{font-size:0.64rem;color:var(--amber);font-weight:700;font-family:'JetBrains Mono',monospace;}
.log-del{margin-left:auto;background:none;border:none;color:var(--muted2);font-size:1.15rem;line-height:1;cursor:pointer;padding:0 4px;font-family:inherit;}
.log-del:hover{color:var(--red);}
.log-body{font-size:0.85rem;color:var(--text2);line-height:1.5;margin-top:6px;white-space:pre-wrap;}
.log-empty{font-size:0.78rem;color:var(--muted);font-style:italic;padding:4px 0;}
.cp-note{background:var(--purple-bg);border:1px solid #C4A8DC;border-radius:var(--radius);padding:14px 16px;font-size:0.85rem;line-height:1.6;color:var(--text2);}
.cp-note b{color:var(--purple);}
.master-btn{width:100%;margin-top:26px;padding:16px;border-radius:var(--radius);border:none;font-family:inherit;font-size:0.95rem;font-weight:800;cursor:pointer;transition:all .15s;letter-spacing:0.02em;}
.master-btn.ready{background:var(--accent);color:#fff;}
.master-btn.ready:hover{background:#145535;}
.master-btn.notready{background:var(--surface2);color:var(--muted2);border:1.5px solid var(--border);cursor:not-allowed;}
.master-btn.done{background:var(--accent-bg);color:var(--accent);border:1.5px solid var(--accent);}
.gate-hint{text-align:center;font-size:0.72rem;color:var(--muted);margin-top:10px;}
.unmark{display:block;margin:14px auto 0;background:none;border:none;color:var(--muted);font-size:0.72rem;text-decoration:underline;cursor:pointer;font-family:inherit;}
.bcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-top:14px;box-shadow:var(--shadow-sm);}
.bcard-title{font-size:0.95rem;font-weight:800;color:var(--accent);margin-bottom:3px;}
.bcard-sub{font-size:0.66rem;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:10px;}
.chord-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:12px;margin-top:6px;}
.chord-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 8px 10px;text-align:center;box-shadow:var(--shadow-sm);}
.chord-box .cname{font-size:1rem;font-weight:800;font-family:'JetBrains Mono',monospace;margin-bottom:7px;}
.chord-box svg{width:66px;height:82px;}
.chord-box .csub{font-size:0.55rem;color:var(--muted);margin-top:5px;}
.road{margin-top:6px;}
.road-row{display:flex;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);}
.road-row:last-child{border-bottom:none;}
.road-tag{font-size:0.58rem;font-weight:800;letter-spacing:0.04em;text-transform:uppercase;padding:3px 8px;border-radius:4px;white-space:nowrap;min-width:74px;text-align:center;background:var(--accent-bg);color:var(--accent);}
.road-tag.c{background:var(--purple-bg);color:var(--purple);}
.road-tag.peak{background:#FBEAEA;color:var(--red);}
.road-body{font-size:0.8rem;color:var(--text2);line-height:1.45;}
.road-body b{color:var(--text);font-family:'JetBrains Mono',monospace;font-weight:500;}
.bcard ul{list-style:none;}
.bcard li{font-size:0.84rem;line-height:1.55;padding:6px 0 6px 20px;position:relative;border-bottom:1px solid var(--border);}
.bcard li:last-child{border-bottom:none;}
.bcard li::before{content:'›';position:absolute;left:2px;top:5px;color:var(--accent);font-weight:800;}
.pmod{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.pmod:last-child{border-bottom:none;}
.pmod-n{font-size:0.7rem;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--muted);min-width:26px;}
.pmod-t{flex:1;font-size:0.86rem;font-weight:600;}
.pmod-c{font-size:0.66rem;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:12px 22px;border-radius:24px;font-size:0.82rem;font-weight:700;z-index:999;transition:transform .28s cubic-bezier(.22,1,.36,1);box-shadow:var(--shadow-lg);}
.toast.show{transform:translateX(-50%) translateY(0);}
.storage-banner{background:var(--amber-bg);color:var(--amber);font-size:0.72rem;padding:8px 16px;text-align:center;font-weight:600;display:none;}
@media(max-width:768px){
  .site-header{padding:calc(env(safe-area-inset-top) + 10px) 14px 8px;}
  .logo p{display:none;}
  .ntab{font-size:0.84rem;padding:12px 13px;}
  .d-title{font-size:1.25rem;}
  .item-text{font-size:0.95rem;}
  .l-title{font-size:1rem;}
  .l-focus{font-size:0.82rem;}
}
/* ---- metronome ---- */
.metro{position:fixed;right:14px;bottom:calc(env(safe-area-inset-bottom) + 14px);z-index:950;font-family:inherit;}
.metro-fab{width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;border:none;box-shadow:var(--shadow-lg);cursor:pointer;font-size:1.4rem;line-height:1;display:flex;align-items:center;justify-content:center;transition:transform .12s;}
.metro-fab:active{transform:scale(.93);}
@keyframes metroPulse{0%{box-shadow:0 0 0 0 rgba(26,107,69,.55),var(--shadow-lg);}70%{box-shadow:0 0 0 13px rgba(26,107,69,0),var(--shadow-lg);}100%{box-shadow:0 0 0 0 rgba(26,107,69,0),var(--shadow-lg);}}
.metro-fab.on{animation:metroPulse 1s infinite;}
.metro-panel{display:none;position:absolute;right:0;bottom:64px;width:236px;background:var(--surface);border:1.5px solid var(--border2);border-radius:14px;box-shadow:var(--shadow-lg);padding:14px;}
.metro-panel.open{display:block;}
.metro-row{display:flex;align-items:center;gap:9px;}
.metro-bpm-big{font-size:1.9rem;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--text);line-height:1;}
.metro-bpm-big em{font-size:0.66rem;color:var(--muted);font-weight:600;font-style:normal;margin-left:4px;}
.metro-beats{display:flex;gap:6px;margin-left:auto;}
.metro-dot{width:10px;height:10px;border-radius:50%;background:var(--border2);transition:background .04s,transform .04s;}
.metro-dot.beat{background:var(--accent);transform:scale(1.4);}
.metro-dot.accent.beat{background:var(--amber);}
.metro-slider{flex:1;accent-color:var(--accent);}
.metro-btn{font-family:inherit;font-weight:700;font-size:0.82rem;padding:9px 12px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text2);border-radius:8px;cursor:pointer;}
.metro-btn.sm{width:36px;padding:9px 0;font-size:1.05rem;text-align:center;}
.metro-btn.grow{flex:1;}
.metro-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.chip.tempo.metro-launch{cursor:pointer;border-style:solid;}
.chip.tempo.metro-launch:hover{background:var(--amber);color:#fff;}
/* ---- hear-this-section (embedded player) ---- */
.hear-btn{cursor:pointer;font-family:inherit;font-weight:700;font-size:0.72rem;padding:6px 11px;border:1.5px solid var(--accent);background:var(--accent);color:#fff;border-radius:var(--radius-sm);}
.hear-btn:hover{background:#145535;}
.player-modal{display:none;position:fixed;inset:0;z-index:940;background:var(--bg);flex-direction:column;}
.player-modal.open{display:flex;}
.player-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:calc(env(safe-area-inset-top) + 12px) 18px 12px;background:var(--surface);border-bottom:1px solid var(--border);font-weight:700;font-size:0.85rem;}
.player-head .ph-title{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.player-head .ph-sub{font-size:0.62rem;color:var(--muted);font-weight:600;font-family:'JetBrains Mono',monospace;margin-left:6px;}
.player-head button{flex:none;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text2);border-radius:var(--radius-sm);padding:7px 14px;font-family:inherit;font-weight:700;font-size:0.72rem;cursor:pointer;}
.player-modal iframe{flex:1;width:100%;border:none;background:#0f1115;}
</style>
</head>
<body>
<div class="topbar">
<header class="site-header"><div class="header-inner">
  <div class="logo"><h1>如烟 <span>· Mastery Path</span></h1><p>王一编配 · Key A · No Capo · Module Path</p></div>
  <div class="header-btns">
    <button class="hbtn" onclick="doExport()">Backup</button>
    <button class="hbtn" onclick="document.getElementById('imp').click()">Restore</button>
    <button class="hbtn" onclick="doReset()">Reset</button>
    <input type="file" id="imp" accept="application/json" style="display:none" onchange="doImport(event)">
  </div>
</div></header>
<div class="storage-banner" id="sb">⚠ Browser storage unavailable — progress won't save this session.</div>
<div class="nav-wrap"><div class="nav" id="nav"></div></div>
</div>
<main class="wrap" id="main"></main>
<div class="scrim" id="scrim" onclick="closeDetail()"></div>
<div class="detail" id="detail"><div class="d-close"><span id="dCrumb">Lesson</span><button onclick="closeDetail()">✕ Close</button></div><div class="d-body" id="dBody"></div></div>
<div class="metro">
  <div class="metro-panel" id="metroPanel">
    <div class="metro-row">
      <div class="metro-bpm-big"><span id="metroBpm">80</span><em>bpm</em></div>
      <div class="metro-beats"><div class="metro-dot accent"></div><div class="metro-dot"></div><div class="metro-dot"></div><div class="metro-dot"></div></div>
    </div>
    <div class="metro-row" style="margin-top:12px">
      <button class="metro-btn sm" onclick="Metro.nudge(-1)" aria-label="slower">–</button>
      <input type="range" class="metro-slider" id="metroSlider" min="40" max="200" value="80" oninput="Metro.setBpm(this.value)">
      <button class="metro-btn sm" onclick="Metro.nudge(1)" aria-label="faster">+</button>
    </div>
    <div class="metro-row" style="margin-top:12px;gap:8px">
      <button class="metro-btn primary grow" onclick="Metro.toggle()"><span id="metroStartIcon">▶</span> <span id="metroStartTxt">Start</span></button>
      <button class="metro-btn grow" onclick="Metro.tap()">Tap tempo</button>
    </div>
  </div>
  <button class="metro-fab" id="metroFab" onclick="Metro.fab()" aria-label="Metronome">⏱</button>
</div>
<div class="player-modal" id="playerModal">
  <div class="player-head">

{n:1,t:'The Barre Foundation',g:'This version is played in A with no capo, so it lives on barre chords. Build them first — every section below depends on a clean, reliable barre.',lessons:[

  stds:['F#m rings all six strings clean.','Held for eight slow beats with no string dying.','Formed reliably from scratch in about 3 seconds.']},

{n:2,t:'Open Chords & The Progressions',g:'Lock the non-barre shapes, then put the open and barre chords together into the song\u2019s actual verse and chorus progressions.',lessons:[

const FLAT=[];MODULES.forEach(m=>m.lessons.forEach(l=>FLAT.push(l.id)));
let OK=false,S={};
function init(){
 try{localStorage.setItem('_t','1');localStorage.removeItem('_t');OK=true;}catch(e){OK=false;document.getElementById('sb').style.display='block';}
 if(OK){try{S=JSON.parse(localStorage.getItem('ruyan_lessons_v1')||'{}');}catch(e){S={};}}
 Object.keys(S).forEach(id=>{const o=S[id];if(!o)return;if(!Array.isArray(o.logs))o.logs=[];if(o.notes&&o.notes.trim()&&o.logs.length===0){o.logs.unshift({ts:Date.now(),min:null,note:o.notes.trim(),migrated:true});o.notes='';}});
 persist();
}
function persist(){if(OK)try{localStorage.setItem('ruyan_lessons_v1',JSON.stringify(S));}catch(e){}}
function st(id){if(!S[id])S[id]={mastered:false,tasks:{},stds:{},notes:'',recorded:false,review:'',logs:[]};if(!Array.isArray(S[id].logs))S[id].logs=[];return S[id];}
function isMastered(id){return !!(S[id]&&S[id].mastered);}
function statusOf(id){if(isMastered(id))return 'mastered';const i=FLAT.indexOf(id);if(i===0)return 'available';return isMastered(FLAT[i-1])?'available':'locked';}
function lessonById(id){for(const m of MODULES)for(const l of m.lessons)if(l.id===id)return l;}
function moduleProgress(m){const tot=m.lessons.length;const done=m.lessons.filter(l=>isMastered(l.id)).length;return {done,tot};}
let view=1;
function renderNav(){
 let h=MODULES.map(m=>{const p=moduleProgress(m);const cls=p.done===p.tot?'done':(p.done>0?'part':'');const firstLocked=statusOf(m.lessons[0].id)==='locked';
  return '<button class="ntab '+(view===m.n?'active':'')+'" onclick="go('+m.n+')"><span class="mod-dot '+cls+'"></span>M'+m.n+(firstLocked?' <span class="lock">\uD83D\uDD12</span>':'')+'</button>';}).join('');
 h+='<button class="ntab '+(view==='ref'?'active':'')+'" onclick="go(\'ref\')" style="color:'+(view==='ref'?'var(--accent)':'var(--purple)')+'">\u266A Reference</button>';
 h+='<button class="ntab '+(view==='prog'?'active':'')+'" onclick="go(\'prog\')">\uD83D\uDCC8 Progress</button>';
 document.getElementById('nav').innerHTML=h;
}
function go(v){view=v;render();window.scrollTo({top:0});}
function render(){
 renderNav();const main=document.getElementById('main');
 if(view==='ref'){main.innerHTML=renderRef();return;}
 if(view==='prog'){main.innerHTML=renderProg();return;}
 const m=MODULES.find(x=>x.n===view);const p=moduleProgress(m);const pct=Math.round(p.done/p.tot*100);
 let h='<div class="mod-head"><div class="mtag">Module '+m.n+'</div><h2>'+m.t+'</h2><p>'+m.g+'</p><div class="mod-prog"><div class="bar"><i style="width:'+pct+'%"></i></div><span>'+p.done+'/'+p.tot+'</span></div></div>';
 h+=m.lessons.map(l=>renderLesson(l)).join('');
 main.innerHTML=h;
}
function renderLesson(l){
 const s=statusOf(l.id);const cp=l.cp?'cp':'';
 const badge=l.cp?'\u25C6':(s==='mastered'?'\u2713':(l.id.split('.')[1]||'\u2605'));
 const statusTxt=s==='mastered'?'Mastered':s==='available'?(l.cp?'Ready':'Available'):'Locked';
 const chips=(l.tempo&&l.tempo!=='\u2014'?'<span class="chip tempo">\u266A '+l.tempo+'</span>':'')+(l.covers?'<span class="chip '+(l.cp?'cp':'covers')+'">'+l.covers+'</span>':'')+(l.cp?'<span class="chip cp">recording</span>':'');
 const onclick=s==='locked'?'':'onclick="openLesson(\''+l.id+'\')"';
 return '<div class="lesson '+s+' '+cp+'" '+onclick+'><div class="l-badge '+s+' '+cp+'">'+badge+'</div><div class="l-main"><div class="l-title">'+l.t+'</div><div class="l-focus">'+l.f+'</div><div class="l-chips">'+chips+'</div></div><div class="l-status '+s+'">'+(s==='locked'?'\uD83D\uDD12 '+statusTxt:statusTxt)+'</div></div>';
}
let curId=null;
function openLesson(id,keep){const __det=document.getElementById('detail');const __sc=keep?__det.scrollTop:0;
 if(statusOf(id)==='locked')return;
 curId=id;const l=lessonById(id);const s=st(id);const mod=MODULES.find(m=>m.lessons.some(x=>x.id===id));
 document.getElementById('dCrumb').textContent='Module '+mod.n+' \u00B7 '+(l.cp?'Checkpoint':'Lesson '+id);
 const meta=(l.tempo&&l.tempo!=='\u2014'?'<button class="chip tempo metro-launch" onclick="Metro.start('+parseInt(l.tempo,10)+')" title="Start metronome at this tempo">\u266A '+l.tempo+' \u00B7 click</button>':'')+(l.covers?'<span class="chip '+(l.cp?'cp':'covers')+'">'+l.covers+'</span>':'');
 const hear=(!l.cp&&typeof SECTION_MAP!=='undefined'&&SECTION_MAP[l.id])?'<button class="hear-btn" onclick="hearSection(\''+l.id+'\')" title="Play this section, looped, chords only">▶ Hear this section</button>':'';
 let h='<div class="d-title">'+l.t+'</div><div class="d-focus">'+l.f+'</div><div class="d-meta">'+meta+hear+'</div>';
 if(l.cp){
  h+='<div class="d-section"><div class="d-h cp">What to record</div>'+l.rec.map(r=>'<div class="item"><div class="item-text">'+r+'</div></div>').join('')+'</div>';
  h+='<div class="d-section"><div class="cp-note">\uD83D\uDCE4 <b>Send the recording to Claude in chat.</b> I will analyse timing, tempo steadiness, dynamics and note clarity, and review any hand-position photos \u2014 then give specific feedback. Paste the key points below so this checkpoint keeps a record.</div></div>';
  h+='<div class="d-section"><div class="d-h">Recording done</div><div class="item"><div class="check '+(s.recorded?'on':'')+'" onclick="toggleRec()"></div><div class="item-text">I have recorded this and sent it for review.</div></div></div>';
 } else {
  h+='<div class="d-section"><div class="d-h">Practise</div>'+l.tasks.map((t,i)=>'<div class="item"><div class="check '+(s.tasks[i]?'on':'')+'" onclick="toggleTask('+i+')"></div><div class="item-text">'+t+'</div></div>').join('')+'</div>';
 }
 h+='<div class="d-section"><div class="d-h std">Standard to pass'+(l.cp?'':' \u2014 tick when true')+'</div>'+l.stds.map((t,i)=>'<div class="item std"><div class="check std '+(s.stds[i]?'on':'')+'" onclick="toggleStd('+i+')"></div><div class="item-text">'+t+'</div></div>').join('')+'</div>';
 if(l.cp){
  h+='<div class="d-section"><div class="d-h">Review notes / self-assessment</div><textarea class="notes" placeholder="Paste Claude feedback or your own assessment..." onchange="saveNotes(this.value)">'+escapeHtml(s.review||'')+'</textarea></div>';
 } else {
  h+='<div class="d-section"><div class="d-h">Practice log</div>'+renderLogForm()+renderLogList(s)+'</div>';
 }
 const allStd=l.stds.every((_,i)=>s.stds[i]);const recOk=l.cp?s.recorded:true;const ready=allStd&&recOk;
 if(s.mastered){
  h+='<button class="master-btn done">\u2713 '+(l.cp?'Checkpoint passed':'Mastered')+' \u2014 next unlocked</button><button class="unmark" onclick="unmark()">un-mark this</button>';
 } else {
  h+='<button class="master-btn '+(ready?'ready':'notready')+'" '+(ready?'onclick="markMastered()"':'')+'>'+(l.cp?'Pass checkpoint':'Mark mastered')+' \u2192 unlock next</button>';
  if(!ready)h+='<div class="gate-hint">'+(l.cp&&!s.recorded?'Mark the recording done, and tick':'Tick')+' all standards above to unlock this.</div>';
 }
 document.getElementById('dBody').innerHTML=h;
 document.getElementById('scrim').classList.add('open');document.getElementById('detail').classList.add('open');document.body.style.overflow='hidden';__det.scrollTop=__sc;
}
function closeDetail(){document.getElementById('scrim').classList.remove('open');document.getElementById('detail').classList.remove('open');document.body.style.overflow='';render();}
function toggleTask(i){const s=st(curId);s.tasks[i]=!s.tasks[i];persist();openLesson(curId,true);}
function toggleStd(i){const s=st(curId);s.stds[i]=!s.stds[i];persist();openLesson(curId,true);}
function toggleRec(){const s=st(curId);s.recorded=!s.recorded;persist();openLesson(curId,true);}
function saveNotes(v){const s=st(curId);const l=lessonById(curId);if(l.cp)s.review=v;else s.notes=v;persist();}
function markMastered(){const s=st(curId);s.mastered=true;persist();const l=lessonById(curId);showToast((l.cp?'Checkpoint passed':'Mastered')+' \u2014 next unlocked');openLesson(curId,true);}
function unmark(){const s=st(curId);s.mastered=false;persist();openLesson(curId,true);}
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtLogDate(ts){try{return new Date(ts).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});}catch(e){return '';}}
function renderLogForm(){return '<div class="log-form"><div class="row"><input class="log-min" id="logMin" type="number" inputmode="numeric" min="0" placeholder="0"><span class="log-min-label">minutes practised</span></div><textarea class="log-note" id="logNote" placeholder="What felt clean, tempo reached, what to chase next time..."></textarea><button class="log-add" onclick="addLog()">+ Log session</button></div>';}
function renderLogList(s){
 const logs=s.logs||[];
 if(!logs.length)return '<div class="log-empty">No sessions logged yet \u2014 add your first above.</div>';
 const totMin=logs.reduce((a,e)=>a+(e.min||0),0);
 let h='<div class="log-rollup">'+logs.length+(logs.length===1?' session':' sessions')+(totMin>0?' \u00B7 '+totMin+' min total':'')+'</div><div class="log-list">';
 logs.forEach((e,i)=>{
  const meta=(e.min!=null?e.min+' min':'')+(e.migrated?(e.min!=null?' \u00B7 ':'')+'earlier note':'');
  h+='<div class="log-entry"><div class="log-head"><span class="log-date">'+fmtLogDate(e.ts)+'</span>'+(meta?'<span class="log-meta">'+meta+'</span>':'')+'<button class="log-del" onclick="deleteLog('+i+')" aria-label="delete">\u00D7</button></div>'+(e.note?'<div class="log-body">'+escapeHtml(e.note)+'</div>':'')+'</div>';
 });
 return h+'</div>';
}
function addLog(){
 const s=st(curId);const minEl=document.getElementById('logMin');const noteEl=document.getElementById('logNote');
 const mv=(minEl.value||'').trim();const min=mv===''?null:Math.max(0,parseInt(mv,10)||0);const note=(noteEl.value||'').trim();
 if(min===null&&note===''){showToast('Add a time or a note first');return;}
 s.logs.unshift({ts:Date.now(),min:min,note:note});persist();showToast('Session logged');openLesson(curId,true);
}
function deleteLog(i){if(!confirm('Delete this session log?'))return;const s=st(curId);s.logs.splice(i,1);persist();openLesson(curId,true);}
function chordSVG(dots,opens,muted,barre){
 const W=66,H=82,padX=9,padTop=18,gw=(W-padX*2)/5,fh=(H-padTop-8)/4;
 const fr=[].concat(dots.map(d=>d[1]),(barre?[barre.fret]:[])).filter(f=>f>0);
 const maxF=fr.length?Math.max.apply(null,fr):0;const minF=fr.length?Math.min.apply(null,fr):1;const base=maxF<=4?1:minF;
 let s='<svg viewBox="0 0 '+W+' '+H+'">';
 s+='<rect x="'+padX+'" y="'+padTop+'" width="'+(gw*5)+'" height="'+(fh*4)+'" fill="none" stroke="#B8B6B0" stroke-width="1"/>';
 for(let f=1;f<4;f++)s+='<line x1="'+padX+'" y1="'+(padTop+fh*f)+'" x2="'+(padX+gw*5)+'" y2="'+(padTop+fh*f)+'" stroke="#D0CEC8"/>';
 for(let g=1;g<5;g++)s+='<line x1="'+(padX+gw*g)+'" y1="'+padTop+'" x2="'+(padX+gw*g)+'" y2="'+(padTop+fh*4)+'" stroke="#D0CEC8"/>';
 if(base===1)s+='<rect x="'+padX+'" y="'+(padTop-3)+'" width="'+(gw*5)+'" height="3" fill="#1C1B18"/>';
 else s+='<text x="'+(W-2)+'" y="'+(padTop+9)+'" font-size="8" text-anchor="end" fill="#8C8A84" font-family="monospace">'+base+'fr</text>';
 const rel=f=>f-base+1;
 if(barre)s+='<rect x="'+(padX+gw*barre.from-5)+'" y="'+(padTop+fh*(rel(barre.fret)-0.5)-5)+'" width="'+(gw*(barre.to-barre.from)+10)+'" height="10" rx="5" fill="#1A6B45"/>';
 (opens||[]).forEach(t=>s+='<circle cx="'+(padX+gw*t)+'" cy="'+(padTop-8)+'" r="3" fill="none" stroke="#1A6B45" stroke-width="1.3"/>');
 (muted||[]).forEach(t=>s+='<text x="'+(padX+gw*t)+'" y="'+(padTop-5)+'" font-size="8" text-anchor="middle" fill="#9B2C2C" font-family="monospace">\u00D7</text>');
 (dots||[]).forEach(d=>s+='<circle cx="'+(padX+gw*d[0])+'" cy="'+(padTop+fh*(rel(d[1])-0.5))+'" r="5.5" fill="#1A6B45"/>');
 return s+'</svg>';
}
function renderRef(){
 const C=[
  {n:'A',s:'open',d:chordSVG([[2,2],[3,2],[4,2]],[1,5],[0])},
  {n:'D',s:'open',d:chordSVG([[3,2],[5,2],[4,3]],[2],[0,1])},
  {n:'E',s:'open',d:chordSVG([[1,2],[2,2],[3,1]],[0,4,5])},
  {n:'G',s:'open',d:chordSVG([[0,3],[1,2],[5,3]],[2,3,4])},
  {n:'Am',s:'open',d:chordSVG([[2,2],[3,2],[4,1]],[1,5],[0])},
  {n:'Bm7',s:'easy barre sub',d:chordSVG([[1,2],[3,2],[5,2]],[2,4],[0])},
  {n:'Bm',s:'barre \u00B7 fr2',d:chordSVG([[2,4],[3,4],[4,3]],[],[0],{fret:2,from:1,to:5})},
  {n:'F#m',s:'barre \u00B7 fr2',d:chordSVG([[1,4],[2,4],[3,3]],[],[],{fret:2,from:0,to:5})},
  {n:'C#m',s:'barre \u00B7 fr4',d:chordSVG([[2,6],[3,6],[4,5]],[],[0],{fret:4,from:1,to:5})},
  {n:'F',s:'barre \u00B7 fr1',d:chordSVG([[1,3],[2,3],[3,2]],[],[],{fret:1,from:0,to:5})},
  {n:'C',s:'bridge (C key)',d:chordSVG([[1,3],[2,2],[4,1]],[3,5],[0])},
 ];
 // Road-map chords are DERIVED from the shared song data (ruyan-song.js), so they
 // can never drift from what the player actually plays. Each phase names the song
 // sections it spans via a predicate; distinct chords are pulled in first-use order.
 const chordsWhere=pred=>{const seen=[];(window.RUYAN_SONG?window.RUYAN_SONG.sections:[]).forEach((s,i)=>{if(pred(s,i))s.chords.forEach(c=>{if(seen.indexOf(c[0])<0)seen.push(c[0]);});});return seen;};
 const fmtChords=a=>a.length?' <b>'+a.join(' · ')+'</b>':'';
 const road=[
  {t:'Intro',c:'',d:'Key A. Percussive muted strum + open-string figure.',p:s=>/Intro|间奏/.test(s.name)},
  {t:'Verses',c:'',d:'Key A, picking + strum with melody on top.',p:s=>/Verse/.test(s.name)},
  {t:'Choruses',c:'',d:'Key A, driving strum, three barres in a row.',p:s=>/Pre-chorus|Chorus 1|Chorus 2/.test(s.name)},
  {t:'Bridge',c:'c',d:'Modulates up — 转1=C调. New shapes:',p:s=>s.key==='C'},
  {t:'Return',c:'c',d:'Modulates back — 转1=A调, into the back-half choruses.',p:null},
  {t:'Back-half',c:'',d:'Key A choruses, escalating.',p:s=>/Chorus 3|Chorus 4/.test(s.name)},
  {t:'Climax',c:'peak',d:'Full intensity, then a controlled drop into the outro.',p:null},
  {t:'Outro',c:'peak',d:'Key A, delicate picked fade.',p:s=>/Outro|告别|如烟/.test(s.name)},
 ];
 // dev tripwire: every chord the song uses must have a diagram above
 (function(){const have=new Set(C.map(x=>x.n));const used=new Set();(window.RUYAN_SONG?window.RUYAN_SONG.sections:[]).forEach(s=>s.chords.forEach(c=>used.add(c[0])));const miss=[...used].filter(n=>!have.has(n));if(miss.length)console.warn('[Mastery Path] song uses chords with no diagram:',miss.join(', '));})();
 return '<div class="mod-head"><div class="mtag">Reference</div><h2>Chords & Road Map</h2><p>The 王一编配 arrangement, key of A, no capo. These are the real shapes \u2014 barres included. The chord progressions live in your tab; this is the orientation.</p></div>'+
 '<div class="bcard"><div class="bcard-title">The shapes</div><div class="bcard-sub">no capo \u00B7 \u25EF open \u00B7 \u00D7 muted \u00B7 green bar = barre \u00B7 Nfr = start fret</div><div class="chord-grid">'+C.map(c=>'<div class="chord-box"><div class="cname">'+c.n+'</div>'+c.d+'<div class="csub">'+c.s+'</div></div>').join('')+'</div><p style="font-size:0.74rem;color:var(--muted);margin-top:12px;line-height:1.5">Five barre chords (Bm, Bm7, F#m, C#m, F) carry this version \u2014 Module 1 builds them. <b>Bm7</b> is the lighter stand-in for Bm while the barre develops.</p></div>'+
 '<div class="bcard"><div class="bcard-title">The road map</div><div class="bcard-sub">A \u2192 C \u2192 A, through-composed</div><div class="road">'+road.map(r=>'<div class="road-row"><span class="road-tag '+r.c+'">'+r.t+'</span><span class="road-body">'+(r.d+(r.p?fmtChords(chordsWhere(r.p)):''))+'</span></div>').join('')+'</div></div>'+
 '<div class="bcard"><div class="bcard-title">What makes this version hard</div><div class="bcard-sub">why the modules are ordered this way</div><ul><li>No capo \u2014 it lives on barre chords, so the barre is the first gate</li><li>Three barres in a row in the chorus (C#m \u2013 F#m \u2013 Bm)</li><li>Two key changes: up to C for the bridge, back to A after</li><li>Melody notes sit on top of the strum in the verses</li><li>A percussive muted-strum groove opens the song</li></ul></div>';
}
function renderProg(){
 const totL=FLAT.length;const doneL=FLAT.filter(isMastered).length;const pct=Math.round(doneL/totL*100);
 const cps=[];MODULES.forEach(m=>m.lessons.forEach(l=>{if(l.cp)cps.push(l);}));
 let h='<div class="mod-head"><div class="mtag">Progress</div><h2>Your Path</h2><p>'+doneL+' of '+totL+' lessons mastered. Each module unlocks the next as you pass its standards.</p><div class="mod-prog"><div class="bar"><i style="width:'+pct+'%"></i></div><span>'+pct+'%</span></div></div>';
 h+='<div class="bcard"><div class="bcard-title">Modules</div><div class="bcard-sub">tap a module tab to open its lessons</div>';
 MODULES.forEach(m=>{const p=moduleProgress(m);const locked=statusOf(m.lessons[0].id)==='locked';h+='<div class="pmod"><div class="pmod-n">M'+m.n+'</div><div class="pmod-t">'+m.t+(locked?' \uD83D\uDD12':'')+'</div><div class="pmod-c">'+p.done+'/'+p.tot+'</div></div>';});
 h+='</div><div class="bcard"><div class="bcard-title">Recording checkpoints</div><div class="bcard-sub">upload these to Claude for review</div>';
 cps.forEach(l=>{const done=isMastered(l.id);const open=statusOf(l.id)!=='locked';h+='<div class="pmod"><div class="pmod-n">'+(done?'\u2713':(open?'\u25C6':'\uD83D\uDD12'))+'</div><div class="pmod-t">'+l.t.replace('Checkpoint \u2014 ','')+'</div><div class="pmod-c">'+(done?'passed':(open?'ready':'locked'))+'</div></div>';});
 h+='</div>';
 return h;
}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function doExport(){const blob=new Blob([JSON.stringify({lessons:S,exported:new Date().toISOString()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ruyan-mastery-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();showToast('Backup downloaded');}
function doImport(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(d.lessons){S=d.lessons;persist();render();showToast('Progress restored');}}catch(e){showToast('Could not read that file');}};r.readAsText(f);ev.target.value='';}

   Each lesson maps to the song section(s) it covers, by name substring matched

/* ---- metronome: Web Audio click with a look-ahead scheduler ---- */
const Metro=(function(){
 let ac=null,timer=null,nextT=0,beat=0,BPM=80,BEATS=4,on=false,taps=[];
 const KEY='ruyan_metro_bpm';
 function ctx(){if(!ac)ac=new (window.AudioContext||window.webkitAudioContext)();return ac;}
 function clamp(v){return Math.max(40,Math.min(200,Math.round(v)));}
 function click(t,accent){
  const c=ctx();const o=c.createOscillator(),g=c.createGain();
  o.type='square';o.frequency.value=accent?1600:1050;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(accent?0.5:0.3,t+0.001);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.045);
  o.connect(g).connect(c.destination);o.start(t);o.stop(t+0.06);
 }
 function flash(i){const d=document.querySelectorAll('.metro-dot');d.forEach((el,k)=>el.classList.toggle('beat',k===i));}
 function sched(){const c=ctx();
  while(nextT<c.currentTime+0.13){
   const i=beat%BEATS;click(nextT,i===0);
   setTimeout(()=>{if(on)flash(i);},Math.max(0,(nextT-c.currentTime)*1000));
   nextT+=60/BPM;beat++;
  }}
 function ui(){
  const b=document.getElementById('metroBpm');if(b)b.textContent=BPM;
  const s=document.getElementById('metroSlider');if(s&&+s.value!==BPM)s.value=BPM;
  const ic=document.getElementById('metroStartIcon');if(ic)ic.textContent=on?'⏸':'▶';
  const tx=document.getElementById('metroStartTxt');if(tx)tx.textContent=on?'Stop':'Start';
  const fab=document.getElementById('metroFab');if(fab){fab.classList.toggle('on',on);fab.style.animationDuration=(60/BPM)+'s';}
 }
 function start(b){const c=ctx();c.resume();if(b)BPM=clamp(b);
  if(!on){on=true;beat=0;nextT=c.currentTime+0.08;timer=setInterval(sched,25);}
  openPanel(true);ui();persist();}
 function stop(){on=false;if(timer)clearInterval(timer);timer=null;document.querySelectorAll('.metro-dot').forEach(d=>d.classList.remove('beat'));ui();}
 function toggle(){on?stop():start();}
 function setBpm(v){BPM=clamp(v);ui();persist();}
 function nudge(d){setBpm(BPM+d);}
 function tap(){const now=Date.now();taps=taps.filter(t=>now-t<2000);taps.push(now);
  if(taps.length>=2){let sum=0;for(let i=1;i<taps.length;i++)sum+=taps[i]-taps[i-1];setBpm(60000/(sum/(taps.length-1)));}}
 function openPanel(force){const p=document.getElementById('metroPanel');if(!p)return;force?p.classList.add('open'):p.classList.toggle('open');}
 function fab(){openPanel();}
 function persist(){if(OK)try{localStorage.setItem(KEY,String(BPM));}catch(e){}}
 function load(){if(OK)try{const v=parseInt(localStorage.getItem(KEY),10);if(v)BPM=clamp(v);}catch(e){}}
 return {start,stop,toggle,setBpm,nudge,tap,fab,openPanel,load,ui,get bpm(){return BPM;}};
})();

init();
Metro.load();Metro.ui();
(function(){for(const m of MODULES){if(m.lessons.some(l=>!isMastered(l.id))){view=m.n;break;}}})();
render();
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail();});
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});}
</script>
